<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCold IoT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ตัวแปรสีตามรูปตัวอย่าง */
        :root {
            --bg-dark: #0a1128;        /* สีพื้นหลังเข้มสุด */
            --box-blue: #1e3a8a;       /* สีกล่องหลัก (น้ำเงิน) */
            --box-cyan: #0284c7;       /* สีกล่องรอง (ฟ้า) */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --alert-red: #ef4444;      /* สีแดงแจ้งเตือน */
            --status-green: #22c55e;   /* สีเขียวปกติ */
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* Container สำหรับกล่องตู้เย็น */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* กล่องหลักของตู้เย็นแต่ละตู้ */
        .fridge-card {
            background-color: var(--box-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ชื่อตู้และสถานะ */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .fridge-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
        }

        .fridge-id {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* สถานะ Online/Offline และ Mute Switch */
        .status-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
        }
        .status-online { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.5); }
        .status-offline { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.5); }
        .update-time { display: block; font-size: 0.75rem; color: var(--text-muted); text-align: right; margin-top: 5px; }

        /* กล่องอุณหภูมิ (แบบในรูป) */
        .temp-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .temp-box {
            background-color: var(--box-cyan);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .temp-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .temp-value {
            font-family: 'Noto Sans', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.1;
            margin: 10px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .temp-limit {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        /* 🚨 การตั้งค่าสีแจ้งเตือน (สีแดงกระพริบเมื่อเกินเกณฑ์) */
        .alert-mode {
            background-color: var(--alert-red) !important;
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* กราฟ */
        .chart-wrapper {
            margin-top: 20px;
            height: 100px;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 10px;
        }
        canvas { max-height: 100px; width: 100%; }

        /* ปุ่มและ Mute Switch (สไตล์ Modern) */
        .controls { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .switch-label { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px;}
        
        /* Custom Checkbox สำหรับ Mute */
        .toggle-switch { position: relative; width: 40px; height: 20px; display: inline-block; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--status-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-settings { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;}
        .btn-settings:hover { background: rgba(255,255,255,0.2); }

        /* Loader */
        .loader { text-align: center; color: #38bdf8; margin: 50px 0; }
    </style>
</head>
<body>

    <div class="header-title">
        <i class="fas fa-satellite-dish"></i> AuraCold IoT Dashboard
    </div>

    <div id="loading" class="loader">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
        <p class="mt-2">กำลังเชื่อมต่อฐานข้อมูล...</p>
    </div>

    <div id="fridgeContainer" class="dashboard-grid">
        </div>

<script>
    // 🌟 เปลี่ยนเป็น Web App URL ของพี่ตรงนี้
    const API = "https://script.google.com/macros/s/AKfycby_x6ONgB88kyShpX2EFZgrgHLqN-LsCJ-eMiYhZt7I_FpdorEUcAFwOQuH6oUDsRVLSg/exec";
    
    let deviceSettings = {}; 
    let chartInstances = {};

    async function loadData() {
        document.getElementById('loading').style.display = 'none';
        try {
            const res = await fetch(`${API}?action=dashboard`);
            const data = await res.json();
            
            data.forEach(d => {
                deviceSettings[d.dev] = { name: d.name, nMin: d.nMin, nMax: d.nMax, fMin: d.fMin, fMax: d.fMax };
            });
            
            renderDashboard(data);
        } catch (e) { 
            console.error("Error loading data:", e);
            document.getElementById('loading').innerHTML = "<span style='color:#ef4444'>ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่</span>";
        }
    }

    async function toggleAlert(devId, isChecked) {
        try {
            await fetch(`${API}?action=toggle_alert&devId=${devId}`);
            loadData();
        } catch (error) {
            alert("ไม่สามารถเปลี่ยนสถานะได้ กรุณาลองใหม่");
        }
    }

    function getOfflineStatus(lastUpdateStr) {
        if (!lastUpdateStr) return { online: false, text: "ไม่เคยเชื่อมต่อ" };
        const diffMins = Math.floor((new Date() - new Date(lastUpdateStr)) / 60000);
        if (diffMins <= 5) return { online: true, text: "ONLINE" };
        const hours = Math.floor(diffMins / 60); const mins = diffMins % 60;
        return { online: false, text: hours > 0 ? `OFFLINE ${hours}h ${mins}m` : `OFFLINE ${mins}m` };
    }

    function renderDashboard(data) {
        const container = document.getElementById('fridgeContainer');
        container.innerHTML = data.map(item => {
            const isTNErr = (item.curTN !== "N/A" && (item.curTN < item.nMin || item.curTN > item.nMax));
            const isTFErr = (item.curTF !== "N/A" && (item.curTF < item.fMin || item.fMax < item.curTF));
            const status = getOfflineStatus(item.lastUpdate);
            const isAlertOn = item.alertEnabled === 1;

            return `
            <div class="fridge-card">
                <div class="card-header">
                    <div>
                        <h2 class="fridge-name">${item.name}</h2>
                        <span class="fridge-id"><i class="fas fa-microchip"></i> ID: ${item.dev}</span>
                    </div>
                    <div style="text-align: right;">
                        <div class="status-badge ${status.online ? 'status-online' : 'status-offline'}">
                            <i class="fas ${status.online ? 'fa-wifi' : 'fa-exclamation-triangle'}"></i> ${status.text}
                        </div>
                        <span class="update-time">${item.lastUpdate ? new Date(item.lastUpdate).toLocaleTimeString('th-TH') : '-'}</span>
                    </div>
                </div>

                <div class="temp-container">
                    <div class="temp-box ${isTNErr ? 'alert-mode' : ''}" style="${!isAlertOn ? 'opacity:0.5' : ''}">
                        <div class="temp-title">ช่องธรรมดา (Normal)</div>
                        <div class="temp-value">${item.curTN}</div>
                        <div class="temp-limit">Min: ${item.nMin} | Max: ${item.nMax}</div>
                    </div>
                    
                    <div class="temp-box ${isTFErr ? 'alert-mode' : ''}" style="${!isAlertOn ? 'opacity:0.5' : ''}">
                        <div class="temp-title">ช่องแช่แข็ง (Freezer)</div>
                        <div class="temp-value">${item.curTF}</div>
                        <div class="temp-limit">Min: ${item.fMin} | Max: ${item.fMax}</div>
                    </div>
                </div>

                <div class="chart-wrapper">
                    <canvas id="chart-${item.dev}"></canvas>
                </div>

                <div class="controls">
                    <label class="switch-label">
                        <div class="toggle-switch">
                            <input type="checkbox" id="switch-${item.dev}" ${isAlertOn ? 'checked' : ''} onchange="toggleAlert('${item.dev}', this.checked)">
                            <span class="slider"></span>
                        </div>
                        ${isAlertOn ? '<i class="fas fa-bell text-success"></i> แจ้งเตือนทำงาน' : '<i class="fas fa-bell-slash text-danger"></i> ปิดแจ้งเตือน'}
                    </label>
                    <button class="btn-settings" onclick="alert('ฟีเจอร์ตั้งค่า (ใส่โค้ด Modal เดิมได้เลยครับ)')"><i class="fas fa-cog"></i> ตั้งค่า</button>
                </div>
            </div>`;
        }).join('');

        // วาดกราฟ (ปรับสีให้เข้ากับธีมมืด)
        data.forEach(item => {
            if (item.chartData && item.chartData.length > 0) {
                const ctx = document.getElementById(`chart-${item.dev}`).getContext('2d');
                if (chartInstances[item.dev]) chartInstances[item.dev].destroy(); 
                
                Chart.defaults.color = '#94a3b8'; // สีแกนกราฟ
                
                chartInstances[item.dev] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: item.chartData.map(c => c.time),
                        datasets: [
                            { label: 'Normal', data: item.chartData.map(c => c.tN), borderColor: '#4ade80', borderWidth: 2, pointRadius: 0, tension: 0.4 },
                            { label: 'Freezer', data: item.chartData.map(c => c.tF), borderColor: '#38bdf8', borderWidth: 2, pointRadius: 0, tension: 0.4 }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            x: { display: false }, 
                            y: { display: true, grid: { color: 'rgba(255,255,255,0.1)' } } 
                        } 
                    }
                });
            }
        });
    }

    loadData();
    setInterval(loadData, 60000); 
</script>
</body>
</html>
