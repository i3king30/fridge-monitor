<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>HMHOS IoT Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Tahoma'; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .temp-now { font-size: 2.8rem; font-weight: bold; color: #0d6efd; }
        .limit-box { background: #e9ecef; border-radius: 8px; padding: 5px; font-size: 0.85rem; color: #666; }
        .online { color: #198754; } .offline { color: #dc3545; }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="mb-4 text-center fw-bold">📊 ระบบมอนิเตอร์ตู้เย็น Cloud</h2>
    <div id="fridge-container" class="row g-4"></div>
</div>

<script>
    const WEB_APP_URL = "ใส่_WEB_APP_URL_ของพี่/exec";

    async function fetchData() {
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            const container = document.getElementById('fridge-container');
            container.innerHTML = '';
            
            data.forEach(item => {
                const card = `
                <div class="col-md-6 col-lg-4">
                    <div class="card p-3">
                        <div class="d-flex justify-content-between">
                            <h5 class="fw-bold">${item.name}</h5>
                            <span class="${item.isOnline ? 'online' : 'offline'}">● ${item.isOnline ? 'Online' : 'Offline'}</span>
                        </div>
                        <div class="row text-center mt-3">
                            <div class="col-6 border-end">
                                <small>ช่องธรรมดา</small>
                                <div class="temp-now">${item.tN}°</div>
                                <div class="limit-box">เกณฑ์: ${item.nMin} ถึง ${item.nMax}</div>
                            </div>
                            <div class="col-6">
                                <small>ช่องแช่แข็ง</small>
                                <div class="temp-now text-info">${item.fN}°</div>
                                <div class="limit-box">เกณฑ์: ${item.fMin} ถึง ${item.fMax}</div>
                            </div>
                        </div>
                        <div class="text-center mt-3 text-muted" style="font-size: 0.75rem;">
                            อัปเดตล่าสุด: ${new Date(item.lastUpdate).toLocaleString('th-TH')}
                        </div>
                    </div>
                </div>`;
                container.innerHTML += card;
            });
        } catch (e) { console.log(e); }
    }
    fetchData();
    setInterval(fetchData, 30000); // รีเฟรชทุก 30 วินาที
</script>
</body>
</html>
